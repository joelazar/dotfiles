disableStartupPopups: true
notARepository: "skip"
promptToReturnFromSubprocess: false
git:
  pagers:
    - pager: delta --dark --paging=never --no-gitconfig --line-numbers --hunk-header-style=omit --file-modified-label='' --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
    - pager: delta --dark --paging=never --no-gitconfig --line-numbers --hunk-header-style=omit --file-modified-label='' --side-by-side --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
  parseEmoji: true
  remoteBranchSortOrder: "alphabetical"
gui:
  sidePanelWidth: 0.25
  useHunkModeInStagingView: true
  skipDiscardChangeWarning: true
  showCommandLog: false
  nerdFontsVersion: "3"
  showFileTree: true
  fileTreeSortOrder: "foldersFirst"
  showBottomLine: false
  showRandomTip: false
  border: "rounded"
  # Catppuccin Mocha (mauve accent)
  theme:
    activeBorderColor:
      - "#cba6f7"
      - "bold"
    inactiveBorderColor:
      - "#a6adc8"
    searchingActiveBorderColor:
      - "#f9e2af"
      - "bold"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    inactiveViewSelectedLineBgColor:
      - "#6c7086"
    cherryPickedCommitFgColor:
      - "#cba6f7"
    cherryPickedCommitBgColor:
      - "#45475a"
    markedBaseCommitFgColor:
      - "#89b4fa"
    markedBaseCommitBgColor:
      - "#f9e2af"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
  authorColors:
    "*": "#b4befe"
update:
  method: never
customCommands:
  - key: "<c-n>"
    description: "New branch with prefix"
    prompts:
      - type: "menu"
        title: "Creating new branch. What kind of branch is it?"
        options:
          - name: "feature"
            value: "feat"
            key: "f"
          - name: "hotfix"
            value: "hotfix"
            key: "h"
          - name: "fix/bugfix"
            value: "fix"
            key: "x"
          - name: "chore"
            value: "chore"
            key: "c"
          - name: "experiment"
            value: "experiment"
            key: "e"
      - type: "input"
        title: "What is the new branch name?"
        initialValue: ""
    command: "git checkout -b {{index .PromptResponses 0}}/{{index .PromptResponses 1}}"
    context: "localBranches"
    loadingText: "Creating branch"
  - key: "<c-r>"
    description: "Create pull request on GitHub"
    context: files, localBranches
    command: "pr-create"
    output: terminal
    loadingText: "Creating pull request on GitHub"
  - key: "o"
    command: "gh repo view --web"
    context: "localBranches"
    description: "View Repo on GitHub"
    loadingText: "Opening GitHub - Repository ..."
  - key: "O"
    command: "gh pr view --web"
    context: "localBranches"
    description: "View PR on GitHub"
    loadingText: "Opening GitHub - Pull request ..."
  - key: "Y"
    command: "gh pr view --json url --jq '.url' | pbcopy"
    context: "localBranches"
    description: "Copy PR URL to clipboard"
    loadingText: "Copying PR URL to clipboard ..."
  - key: "<c-p>"
    command: "git branch -vv | grep ': gone]' | awk '{print $1}' | xargs -r git branch -D"
    context: "localBranches"
    loadingText: "Pruning..."
    description: "Prune local branches whose upstream is gone"
  - key: "<c-p>"
    command: "git remote prune {{.SelectedRemote.Name}}"
    context: "remotes"
    description: "Prune deleted remote branches"
    loadingText: "Pruning..."
  - key: "<c-v>"
    context: "global"
    description: "Create new conventional commit"
    prompts:
      - type: "menu"
        key: "Type"
        title: "Type of change"
        options:
          - name: "build"
            description: "Changes that affect the build system or external dependencies"
            value: "build"
            key: "b"
          - name: "feat"
            description: "A new feature"
            value: "feat"
            key: "f"
          - name: "fix"
            description: "A bug fix"
            value: "fix"
            key: "x"
          - name: "chore"
            description: "Other changes that don't modify src or test files"
            value: "chore"
            key: "c"
          - name: "ci"
            description: "Changes to CI configuration files and scripts"
            value: "ci"
            key: "i"
          - name: "docs"
            description: "Documentation only changes"
            value: "docs"
            key: "d"
          - name: "perf"
            description: "A code change that improves performance"
            value: "perf"
            key: "p"
          - name: "refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
            key: "r"
          - name: "revert"
            description: "Reverts a previous commit"
            value: "revert"
            key: "v"
          - name: "style"
            description: "Changes that do not affect the meaning of the code"
            value: "style"
            key: "s"
          - name: "test"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
            key: "t"
      - type: "input"
        title: "Scope"
        key: "Scope"
        initialValue: ""
      - type: "menu"
        key: "Breaking"
        title: "Breaking change"
        options:
          - name: "no"
            value: ""
            key: "n"
          - name: "yes"
            value: "!"
            key: "y"
      - type: "input"
        title: "message"
        key: "Message"
        initialValue: ""
      - type: "confirm"
        key: "Confirm"
        title: "Commit"
        body: "Are you sure you want to commit?"
    command: "git commit --message '{{.Form.Type}}{{ if .Form.Scope }}({{ .Form.Scope }}){{ end }}{{.Form.Breaking}}: {{.Form.Message}}'"
    loadingText: "Creating conventional commit..."
  - key: "<c-c>"
    command: "pi -p --no-session '/commit'"
    context: "files"
    description: "AI commit with pi"
    output: log
  - key: "<c-g>"
    command: "gitmoji -c"
    context: "files"
    description: "Open gitmoji"
    output: terminal
  - key: "R"
    command: "git reset --soft HEAD~1"
    context: "files"
    description: "Undo last commit"
  - key: "f"
    command: "git difftool -y {{.SelectedLocalCommit.Sha}} -- {{.SelectedCommitFile.Name}}"
    context: "commitFiles"
    description: "Compare (difftool) with local copy"
  - key: "V"
    command: "git add -AN 2>/dev/null; git diff | diffnav"
    context: "files"
    description: "View diff in diffnav"
    output: terminal
