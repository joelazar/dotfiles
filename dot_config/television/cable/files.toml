[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd", "bat"]

[source]
command = [
  { name = "Files", run = "git ls-files 2>/dev/null || fd -t f" },
  { name = "Files +ignored +hidden", run = "fd -t f -I -H" },
  { name = "Dirs", run = "fd -t d" },
  { name = "Dirs +ignored +hidden", run = "fd -t d -I -H" },
]

[preview]
command = "if test -d '{}'; ls -la '{}'; else if test -f '{}'; bat -n --color=always '{}'; else; echo '{}'; end"
shell = "fish"
env = { BAT_THEME = "ansi" }

[keybindings]
ctrl-enter = "actions:edit"
ctrl-up = "actions:goto_parent_dir"

[actions.edit]
description = "Opens the selected entries with the default editor (falls back to vim)"
command = "${EDITOR:-vim} {}"
shell = "bash"
# use `mode = "fork"` if you want to return to tv afterwards
mode = "execute"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv files .."
mode = "execute"
