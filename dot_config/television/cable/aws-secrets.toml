[metadata]
name = "aws-secrets"
description = "A channel to select from AWS Secrets Manager secrets"
requirements = ["aws"]

[source]
command = "aws secretsmanager list-secrets --query 'SecretList[].[Name,Description]' --output text"

[preview]
command = "aws secretsmanager describe-secret --secret-id '{split:\t:0}' --output json | jq -C"

[ui.preview_panel]
size = 60

[keybindings]
enter = "actions:view"

[actions.view]
description = "View the value of the selected secret"
command = "aws secretsmanager get-secret-value --secret-id '{split:\t:0}' --query SecretString --output text | jq -C . 2>/dev/null || aws secretsmanager get-secret-value --secret-id '{split:\t:0}' --query SecretString --output text; read -n 1 -s -p 'Press any key to continue...'"
shell = "bash"
mode = "execute"

