[metadata]
name = "ssh-hosts"
description = "Select hosts from your SSH config, including Include files"
requirements = ["ssh"]

[source]
command = '''cd ~/.ssh && cat config $(awk 'tolower($1)=="include" {for(i=2;i<=NF;i++) print $i}' config) 2>/dev/null | awk 'tolower($1)=="host" {for(i=2;i<=NF;i++) if ($i !~ /[*?!\[]/) print $i}' | sort -fu'''

[preview]
command = "ssh -G '{}'"

[keybindings]
ctrl-enter = "actions:connect"

[actions.connect]
description = "SSH into the selected host"
command = "ssh '{}'"
shell = "fish"
mode = "execute"
