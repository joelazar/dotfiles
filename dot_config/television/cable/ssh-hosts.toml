[metadata]
name = "ssh-hosts"
description = "A channel to select hosts from your SSH config, including Include files"
requirements = ["python3", "ssh"]

[source]
command = '''python3 -c 'import glob, os, shlex
seen = set()
files = []
def expand_include(pattern, base):
    pattern = os.path.expanduser(os.path.expandvars(pattern))
    if not os.path.isabs(pattern):
        pattern = os.path.join(base, pattern)
    return glob.glob(pattern)
def visit(path):
    path = os.path.abspath(os.path.expanduser(os.path.expandvars(path)))
    if path in seen:
        return
    seen.add(path)
    files.append(path)
    try:
        lines = open(path, encoding="utf-8").read().splitlines()
    except OSError:
        return
    base = os.path.dirname(path)
    for line in lines:
        try:
            parts = shlex.split(line, comments=True, posix=True)
        except ValueError:
            continue
        if parts and parts[0].lower() == "include":
            for include in parts[1:]:
                for match in expand_include(include, base):
                    visit(match)
visit("~/.ssh/config")
hosts = set()
for path in files:
    try:
        lines = open(path, encoding="utf-8").read().splitlines()
    except OSError:
        continue
    for line in lines:
        try:
            parts = shlex.split(line, comments=True, posix=True)
        except ValueError:
            continue
        if parts and parts[0].lower() == "host":
            for host in parts[1:]:
                if not any(char in host for char in "*?!["):
                    hosts.add(host)
print("\n".join(sorted(hosts, key=str.lower)))' '''

