add_newline = false

[aws]
disabled = true

[gcloud]
disabled = true

[env_var.YAZI_LEVEL]
variable = "YAZI_LEVEL"
format = "[🦆](yellow) "

[env_var.MISE_ENV]
variable = "MISE_ENV_DISPLAY"
format = '[$env_value]($style) '
style = "bold yellow"

[git_metrics]
disabled = false

[cmd_duration]
disabled = false

[docker_context]
disabled = true

[kubernetes]
format = '[⛵$context](green) '
disabled = true

[mise]
disabled = false

[sudo]
style = 'bold yellow'
symbol = '🧙'
disabled = false

[line_break]
disabled = false

[directory]
truncate_to_repo = false
truncation_length = 0
