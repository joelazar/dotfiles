#!/bin/bash
# Managed by chezmoi — tracked settings are defined below.
# Local-only sections like [projects.*] are preserved from the existing file.

set -euo pipefail

# --- Tracked config (edit here) ---
MANAGED_CONFIG='model = "gpt-5.5"
model_reasoning_effort = "low"
approval_policy = "on-request"
personality = "pragmatic"

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-remaining",
]

[tui.model_availability_nux]
"gpt-5.5" = 3

[plugins."github@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[marketplaces.openai-bundled]
source_type = "local"
source = "/Users/joelazar/.codex/.tmp/bundled-marketplaces/openai-bundled"

[desktop]
appearanceTheme = "dark"
usePointerCursors = false
composerEnterBehavior = "cmdIfMultiline"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-branch-prefix = ""
git-commit-instructions = "check my previous commits styling and follow that when you make commits"
git-pr-instructions = "when you open up pull request, summarize the changes in a couple of bullet points, make them concise"
default-service-tier = "priority"

[desktop.open-in-target-preferences]
global = "zed"

[features]
js_repl = false
'

# --- Read existing file from stdin ---
EXISTING="$(cat)"

# If no existing file, just output managed config
if [ -z "$EXISTING" ]; then
  echo "$MANAGED_CONFIG"
  exit 0
fi

# Merge tracked config with app-generated, machine-specific sections preserved
# from the existing file (codex writes these itself; tracking them would create
# perpetual diffs and leak machine-specific paths):
#   - projects.*                  : per-machine trust levels
#   - marketplaces.*.last_updated : auto-written timestamps
#   - extra plugins / marketplaces / mcp_servers : runtime-generated
#   - tui.model_availability_nux  : a counter the app decrements
echo "$MANAGED_CONFIG" | tomlq -t \
  --slurpfile existing <(echo "$EXISTING" | tomlq '.') \
  '
    ($existing[0] // {}) as $e
    | . as $managed
    | .marketplaces = (
        (($managed.marketplaces // {}) + ($e.marketplaces // {}))
        | with_entries(
            .value.last_updated = (($e.marketplaces // {})[.key].last_updated // .value.last_updated // null)
            | .value |= with_entries(select(.value != null))
          )
      )
    | .plugins = (($managed.plugins // {}) + ($e.plugins // {}))
    | if ($e.mcp_servers) then .mcp_servers = $e.mcp_servers else . end
    | if ($e.projects) then .projects = $e.projects else . end
    | if ($e.tui.model_availability_nux)
        then .tui.model_availability_nux = $e.tui.model_availability_nux
        else . end
  '
